---
name: PR Validation
on:
  workflow_call:
    inputs:
      extra_apt_packages:
        required: false
        type: string
        default: ""
permissions:
  contents: read
  pull-requests: write
jobs:
  validate-pr-title:
    name: Validate PR Title (Future Squash Commit)
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          echo "Validating PR title: $PR_TITLE"

          if echo "$PR_TITLE" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|chore|security)(\(.+\))?\!?:.+"; then
            echo "PR title follows conventional commit format"
          else
            echo "PR title must follow conventional commit format"
            echo ""
            echo "Current title: $PR_TITLE"
            echo ""
            echo "Valid formats:"
            echo "- feat: add new feature"
            echo "- fix: resolve bug"
            echo "- feat!: breaking change"
            echo "- fix(scope): specific fix"
            echo ""
            echo "Types: feat, fix, docs, style, refactor, perf, test, chore, security"
            exit 1
          fi

  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        if: inputs.extra_apt_packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ inputs.extra_apt_packages }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build binary
        run: cargo build

      - name: Run tests
        run: cargo test

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings
