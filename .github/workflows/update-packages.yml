---
name: Update Package Repositories
on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      binary_name:
        required: true
        type: string
      pkgdesc:
        required: true
        type: string
      aur_depends:
        required: false
        type: string
        default: "'glibc'"
      nur_build_inputs:
        required: false
        type: string
        default: ""
      nur_description:
        required: false
        type: string
        default: ""
      has_shell_completions:
        required: false
        type: boolean
        default: false
      completion_subcommand:
        required: false
        type: string
        default: "completion"
    secrets:
      BYPASS_BRANCH_RULE_PAT:
        required: true
      AUR_SECRET_KEY:
        required: true
      NUR_PAT:
        required: true
      HOMEBREW_PAT:
        required: true
jobs:
  update-aur:
    name: Update AUR
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm base-devel coreutils curl git openssh sudo

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SECRET_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t rsa,ecdsa,ed25519 aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Checkout AUR Repository
        run: |
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=no" \
            git clone ssh://aur@aur.archlinux.org/${{ inputs.binary_name }}.git aur-pkg || {
              mkdir aur-pkg
              cd aur-pkg
              git init
              git remote add origin ssh://aur@aur.archlinux.org/${{ inputs.binary_name }}.git
            }

      - name: Create non-root build user
        run: |
          useradd -m builduser
          echo "builduser ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers
          chown -R builduser:builduser aur-pkg
          mkdir -p /home/builduser/.ssh
          cp ~/.ssh/id_ed25519 /home/builduser/.ssh/id_ed25519
          chown -R builduser:builduser /home/builduser/.ssh
          chmod 600 /home/builduser/.ssh/id_ed25519

      - name: Update PKGBUILD and Push to AUR
        run: |
          sudo -E -H -u builduser bash <<'SCRIPT'
          cd aur-pkg
          BINARY_NAME="${{ inputs.binary_name }}"
          version="${{ inputs.version }}"
          version="${version#v}"
          curl -OL "https://codeload.github.com/x71c9/${BINARY_NAME}/tar.gz/refs/tags/v${version}"
          sha256sum=$(sha256sum "v${version}" | awk '{print $1}')
          cat > PKGBUILD <<EOF
          pkgname=${BINARY_NAME}
          pkgver=${version}
          pkgrel=1
          pkgdesc="${{ inputs.pkgdesc }}"
          arch=('x86_64' 'aarch64')
          url="https://github.com/x71c9/${BINARY_NAME}"
          license=('MIT')
          depends=(${{ inputs.aur_depends }})
          makedepends=('rust')

          source=("\$pkgname-\$pkgver.tar.gz::https://codeload.github.com/x71c9/\$pkgname/tar.gz/refs/tags/v\$pkgver")
          sha256sums=("${sha256sum}")

          prepare() {
            cd "\$pkgname-\$pkgver"
            export RUSTUP_TOOLCHAIN=stable
            cargo fetch --locked --target "\$(rustc -vV | sed -n 's/host: //p')"
          }

          build() {
            cd "\$pkgname-\$pkgver"
            export RUSTUP_TOOLCHAIN=stable
            export CARGO_TARGET_DIR=target
            cargo build --frozen --release --all-features
          }

          package() {
            cd "\$pkgname-\$pkgver"
            install -Dm0755 -t "\$pkgdir/usr/bin/" "target/release/${BINARY_NAME}"
          }
          EOF
          makepkg --printsrcinfo > .SRCINFO
          git config user.email "mail@x71c9.com"
          git config user.name "x71c9"
          git add PKGBUILD .SRCINFO
          git commit -m "chore(release): release ${version}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=no" git push origin master
          SCRIPT

  update-aur-bin:
    name: Update AUR Binary Package
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm base-devel coreutils curl git openssh sudo

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SECRET_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t rsa,ecdsa,ed25519 aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Checkout AUR Binary Repository
        run: |
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=no" \
            git clone ssh://aur@aur.archlinux.org/${{ inputs.binary_name }}-bin.git aur-bin-pkg || {
              mkdir aur-bin-pkg
              cd aur-bin-pkg
              git init
              git remote add origin ssh://aur@aur.archlinux.org/${{ inputs.binary_name }}-bin.git
            }

      - name: Create non-root build user
        run: |
          useradd -m builduser
          echo "builduser ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers
          chown -R builduser:builduser aur-bin-pkg
          mkdir -p /home/builduser/.ssh
          cp ~/.ssh/id_ed25519 /home/builduser/.ssh/id_ed25519
          chown -R builduser:builduser /home/builduser/.ssh
          chmod 600 /home/builduser/.ssh/id_ed25519

      - name: Update PKGBUILD and Push to AUR
        run: |
          sudo -E -H -u builduser bash <<'SCRIPT'
          cd aur-bin-pkg
          BINARY_NAME="${{ inputs.binary_name }}"
          version="${{ inputs.version }}"
          version="${version#v}"

          curl -OL "https://github.com/x71c9/${BINARY_NAME}/releases/download/v${version}/${BINARY_NAME}-x86_64-unknown-linux-gnu.tar.gz"
          curl -OL "https://github.com/x71c9/${BINARY_NAME}/releases/download/v${version}/${BINARY_NAME}-aarch64-unknown-linux-gnu.tar.gz"

          sha256sum_x86_64=$(sha256sum "${BINARY_NAME}-x86_64-unknown-linux-gnu.tar.gz" | awk '{print $1}')
          sha256sum_aarch64=$(sha256sum "${BINARY_NAME}-aarch64-unknown-linux-gnu.tar.gz" | awk '{print $1}')

          cat > PKGBUILD <<EOF
          pkgname=${BINARY_NAME}-bin
          pkgver=${version}
          pkgrel=1
          pkgdesc="${{ inputs.pkgdesc }} (binary package)"
          arch=('x86_64' 'aarch64')
          url="https://github.com/x71c9/${BINARY_NAME}"
          license=('MIT')
          depends=(${{ inputs.aur_depends }})
          provides=('${BINARY_NAME}')
          conflicts=('${BINARY_NAME}')

          source_x86_64=("${BINARY_NAME}-x86_64-\$pkgver.tar.gz::https://github.com/x71c9/${BINARY_NAME}/releases/download/v\$pkgver/${BINARY_NAME}-x86_64-unknown-linux-gnu.tar.gz")
          source_aarch64=("${BINARY_NAME}-aarch64-\$pkgver.tar.gz::https://github.com/x71c9/${BINARY_NAME}/releases/download/v\$pkgver/${BINARY_NAME}-aarch64-unknown-linux-gnu.tar.gz")

          sha256sums_x86_64=("${sha256sum_x86_64}")
          sha256sums_aarch64=("${sha256sum_aarch64}")

          package() {
            if [[ \$CARCH == "x86_64" ]]; then
              tar -xzf "${BINARY_NAME}-x86_64-\$pkgver.tar.gz"
            elif [[ \$CARCH == "aarch64" ]]; then
              tar -xzf "${BINARY_NAME}-aarch64-\$pkgver.tar.gz"
            fi
            install -Dm755 "${BINARY_NAME}" "\$pkgdir/usr/bin/${BINARY_NAME}"
          }
          EOF

          makepkg --printsrcinfo > .SRCINFO
          git config user.email "mail@x71c9.com"
          git config user.name "x71c9"
          git add PKGBUILD .SRCINFO
          git commit -m "chore(release): release ${version}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=no" git push origin master
          SCRIPT

  update-nur:
    name: Update NUR
    runs-on: ubuntu-latest
    steps:
      - name: Install Nix
        uses: cachix/install-nix-action@v25

      - name: Checkout project repository
        uses: actions/checkout@v5
        with:
          repository: x71c9/${{ inputs.binary_name }}
          ref: ${{ inputs.version }}
          token: ${{ secrets.BYPASS_BRANCH_RULE_PAT }}

      - name: Checkout NUR packages repository
        uses: actions/checkout@v5
        with:
          repository: x71c9/nur-packages
          token: ${{ secrets.NUR_PAT }}
          path: nur-packages

      - name: Bootstrap or update NUR package
        run: |
          BINARY_NAME="${{ inputs.binary_name }}"
          version="${{ inputs.version }}"
          version="${version#v}"
          PKG_DIR="nur-packages/pkgs/${BINARY_NAME}"
          IS_FIRST_RUN=false

          HAS_COMPLETIONS="${{ inputs.has_shell_completions }}"
          NUR_BUILD_INPUTS="${{ inputs.nur_build_inputs }}"
          COMPLETION_SUBCMD="${{ inputs.completion_subcommand }}"
          NUR_DESC="${{ inputs.nur_description }}"
          [ -z "$NUR_DESC" ] && NUR_DESC="${{ inputs.pkgdesc }}"

          mkdir -p "${PKG_DIR}"

          # Register in root default.nix only on first run
          if [ ! -f "${PKG_DIR}/default.nix" ]; then
            IS_FIRST_RUN=true
            awk -v pkg="${BINARY_NAME}" '
              /^}$/ { last_brace_line = NR }
              { lines[NR] = $0 }
              END {
                for (i = 1; i <= NR; i++) {
                  if (i == last_brace_line)
                    print "  " pkg " = pkgs.callPackage ./pkgs/" pkg " { };"
                  print lines[i]
                }
              }
            ' nur-packages/default.nix > nur-packages/default.nix.tmp
            mv nur-packages/default.nix.tmp nur-packages/default.nix
          fi

          # Build the function arguments line
          # For nested attrs like "xorg.libxcb", only the top-level name goes in the args
          if [ -n "$NUR_BUILD_INPUTS" ]; then
            FUNC_ARGS_PKGS=$(echo "$NUR_BUILD_INPUTS" | tr ' ' '\n' | sed 's/\..*//' | sort -u | tr '\n' ' ' | sed 's/  */ /g; s/^ //; s/ $//; s/ /, /g')
          fi
          if [ -n "$NUR_BUILD_INPUTS" ] && [ "$HAS_COMPLETIONS" = "true" ]; then
            FUNC_ARGS="{ lib, rustPlatform, fetchFromGitHub, installShellFiles, ${FUNC_ARGS_PKGS} }:"
          elif [ -n "$NUR_BUILD_INPUTS" ]; then
            FUNC_ARGS="{ lib, rustPlatform, fetchFromGitHub, ${FUNC_ARGS_PKGS} }:"
          elif [ "$HAS_COMPLETIONS" = "true" ]; then
            FUNC_ARGS="{ lib, rustPlatform, fetchFromGitHub, installShellFiles }:"
          else
            FUNC_ARGS="{ lib, rustPlatform, fetchFromGitHub }:"
          fi

          # Build optional nativeBuildInputs line
          if [ "$HAS_COMPLETIONS" = "true" ]; then
            NATIVE_BUILD_INPUTS="  nativeBuildInputs = [ installShellFiles ];"
          else
            NATIVE_BUILD_INPUTS=""
          fi

          # Build optional buildInputs line (full dotted paths preserved, e.g. xorg.libxcb)
          if [ -n "$NUR_BUILD_INPUTS" ]; then
            BUILD_INPUTS_PKGS=$(echo "$NUR_BUILD_INPUTS" | tr '\n' ' ' | sed 's/  */ /g; s/^ //; s/ $//')
            BUILD_INPUTS="  buildInputs = [ ${BUILD_INPUTS_PKGS} ];"
          else
            BUILD_INPUTS=""
          fi

          # Always regenerate default.nix (picks up dependency/description changes)
          # Hash placeholder will be replaced below after prefetch
          Q="''"
          {
            echo "${FUNC_ARGS}"
            echo ""
            echo "rustPlatform.buildRustPackage rec {"
            echo "  pname = \"${BINARY_NAME}\";"
            echo "  version = \"${version}\"; # without \"v\""
            echo ""
            echo "  src = fetchFromGitHub {"
            echo "    owner = \"x71c9\";"
            echo "    repo = \"${BINARY_NAME}\";"
            echo "    rev = \"v\${version}\";"
            echo "    hash = \"sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=\";"
            echo "  };"
            echo ""
            echo "  cargoLock.lockFile = ./Cargo.lock;"
            echo ""
            [ -n "$NATIVE_BUILD_INPUTS" ] && echo "$NATIVE_BUILD_INPUTS"
            [ -n "$BUILD_INPUTS" ] && echo "$BUILD_INPUTS"
            echo ""
            echo "  doCheck = false;"
            echo ""
            if [ "$HAS_COMPLETIONS" = "true" ]; then
              echo "  postInstall = ${Q}"
              echo "    installShellCompletion --cmd ${BINARY_NAME} \\"
              echo "      --bash <(\$out/bin/${BINARY_NAME} ${COMPLETION_SUBCMD} bash) \\"
              echo "      --zsh <(\$out/bin/${BINARY_NAME} ${COMPLETION_SUBCMD} zsh) \\"
              echo "      --fish <(\$out/bin/${BINARY_NAME} ${COMPLETION_SUBCMD} fish)"
              echo "  ${Q};"
              echo ""
            fi
            echo "  mainProgram = \"${BINARY_NAME}\";"
            echo ""
            echo "  meta = with lib; {"
            echo "    description = \"${NUR_DESC}\";"
            echo "    homepage = \"https://github.com/x71c9/${BINARY_NAME}\";"
            echo "    license = licenses.mit;"
            echo "    maintainers = [];"
            echo "    platforms = platforms.linux ++ platforms.darwin;"
            echo "  };"
            echo "}"
          } > "${PKG_DIR}/default.nix"

          # Always copy Cargo.lock and README from the checked-out project
          cp Cargo.lock "${PKG_DIR}/Cargo.lock"
          [ -f README.md ] && cp README.md "${PKG_DIR}/README.md"

          # Update source hash
          echo "Calculating source hash..."
          base32_hash=$(nix-prefetch-url --unpack "https://github.com/x71c9/${BINARY_NAME}/archive/refs/tags/v${version}.tar.gz")
          new_hash=$(nix-hash --type sha256 --to-sri "$base32_hash")
          sed -i "s|hash = \"[^\"]*\"|hash = \"${new_hash}\"|" "${PKG_DIR}/default.nix"
          echo "Updated source hash to ${new_hash}"

          cd nur-packages
          git config user.email "108585118+x71c9@users.noreply.github.com"
          git config user.name "x71c9"
          git add "pkgs/${BINARY_NAME}/"
          [ "$IS_FIRST_RUN" = "true" ] && git add default.nix
          git commit -m "${BINARY_NAME}: ${version}"
          git push origin main
          echo "Changes committed and pushed successfully"

  update-homebrew:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Homebrew tap
        uses: actions/checkout@v5
        with:
          repository: x71c9/homebrew-x71c9
          token: ${{ secrets.HOMEBREW_PAT }}

      - name: Bootstrap or update formula
        run: |
          BINARY_NAME="${{ inputs.binary_name }}"
          version="${{ inputs.version }}"
          version="${version#v}"
          FORMULA="Formula/${BINARY_NAME}.rb"

          download_with_retry() {
            local url="$1" dest="$2"
            for i in 1 2 3 4 5; do
              if curl -fsSL -o "$dest" "$url"; then
                return 0
              fi
              echo "attempt $i failed, retrying in 30s..."
              sleep 30
            done
            echo "failed to download $url after 5 attempts"
            return 1
          }

          download_with_retry \
            "https://github.com/x71c9/${BINARY_NAME}/releases/download/v${version}/${BINARY_NAME}-x86_64-apple-darwin.tar.gz" \
            "${BINARY_NAME}-x86_64.tar.gz"
          download_with_retry \
            "https://github.com/x71c9/${BINARY_NAME}/releases/download/v${version}/${BINARY_NAME}-aarch64-apple-darwin.tar.gz" \
            "${BINARY_NAME}-aarch64.tar.gz"

          SHA256_X86_64=$(sha256sum "${BINARY_NAME}-x86_64.tar.gz" | awk '{print $1}')
          SHA256_AARCH64=$(sha256sum "${BINARY_NAME}-aarch64.tar.gz" | awk '{print $1}')

          CLASS_NAME=$(echo "$BINARY_NAME" | sed 's/\b./\u&/g' | tr -d '-')

          if [ ! -f "$FORMULA" ]; then
            cat > "$FORMULA" <<EOF
          class ${CLASS_NAME} < Formula
            desc "${{ inputs.pkgdesc }}"
            homepage "https://github.com/x71c9/${BINARY_NAME}"
            version "${version}"
            url "https://github.com/x71c9/${BINARY_NAME}/releases/download/v${version}/${BINARY_NAME}-x86_64-apple-darwin.tar.gz"
            sha256 "${SHA256_X86_64}"

            if Hardware::CPU.arm?
              url "https://github.com/x71c9/${BINARY_NAME}/releases/download/v${version}/${BINARY_NAME}-aarch64-apple-darwin.tar.gz"
              sha256 "${SHA256_AARCH64}"
            end

            def install
              bin.install "${BINARY_NAME}"
            end

            test do
              system "#{bin}/${BINARY_NAME}", "--version"
            end
          end
          EOF
          else
            sed -i "s|version \".*\"|version \"${version}\"|" "$FORMULA"
            sed -i "s|url \".*x86_64.*apple.*\"|url \"https://github.com/x71c9/${BINARY_NAME}/releases/download/v${version}/${BINARY_NAME}-x86_64-apple-darwin.tar.gz\"|" "$FORMULA"
            sed -i "s|url \".*aarch64.*apple.*\"|url \"https://github.com/x71c9/${BINARY_NAME}/releases/download/v${version}/${BINARY_NAME}-aarch64-apple-darwin.tar.gz\"|" "$FORMULA"
            # Update sha256 lines in order: x86_64 first, aarch64 second
            awk -v x="${SHA256_X86_64}" -v a="${SHA256_AARCH64}" '
              /sha256 "/ && !done_x { sub(/sha256 ".*"/, "sha256 \"" x "\""); done_x=1; print; next }
              /sha256 "/ && done_x  { sub(/sha256 ".*"/, "sha256 \"" a "\""); print; next }
              { print }
            ' "$FORMULA" > "${FORMULA}.tmp" && mv "${FORMULA}.tmp" "$FORMULA"
          fi

          git config user.name "x71c9"
          git config user.email "108585118+x71c9@users.noreply.github.com"
          git add "$FORMULA"
          git commit -m "${BINARY_NAME}: ${version}"

          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "push rejected (attempt $i), fetching and rebasing..."
            git fetch origin master
            git rebase origin/master
          done
          echo "failed to push after 5 attempts"
          exit 1
