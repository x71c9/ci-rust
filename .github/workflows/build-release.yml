---
name: Build and Release
on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      binary_name:
        required: true
        type: string
      pkgdesc:
        required: true
        type: string
      aur_depends:
        required: false
        type: string
        default: "'glibc'"
      nur_build_inputs:
        required: false
        type: string
        default: ""
      nur_description:
        required: false
        type: string
        default: ""
      has_shell_completions:
        required: false
        type: boolean
        default: false
      completion_subcommand:
        required: false
        type: string
        default: "completion"
      macos_extra_brew:
        required: false
        type: string
        default: ""
      macos_extra_env:
        required: false
        type: string
        default: ""
    secrets:
      BYPASS_BRANCH_RULE_PAT:
        required: true
      HOMEBREW_PAT:
        required: true
      AUR_SECRET_KEY:
        required: true
      NUR_PAT:
        required: true
permissions:
  contents: write
jobs:
  build-macos:
    name: Build macOS Binaries
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: x71c9/${{ inputs.binary_name }}
          ref: ${{ inputs.version }}
          token: ${{ secrets.BYPASS_BRANCH_RULE_PAT }}

      - name: Install macOS system dependencies
        if: inputs.macos_extra_brew != ''
        run: brew install ${{ inputs.macos_extra_brew }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build binary
        run: |
          if [[ -n "${{ inputs.macos_extra_env }}" ]]; then
            for pair in ${{ inputs.macos_extra_env }}; do
              export "$pair"
            done
          fi
          cargo build --release --target ${{ matrix.target }}

      - name: Rename and compress binary
        run: |
          mkdir -p bin
          cp target/${{ matrix.target }}/release/${{ inputs.binary_name }} bin/${{ inputs.binary_name }}
          tar -czvf bin/${{ inputs.binary_name }}-${{ matrix.target }}.tar.gz -C bin ${{ inputs.binary_name }}

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.binary_name }}-${{ matrix.target }}
          path: bin/${{ inputs.binary_name }}-${{ matrix.target }}.tar.gz

  build-linux:
    name: Build Linux Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: x71c9/${{ inputs.binary_name }}
          ref: ${{ inputs.version }}
          token: ${{ secrets.BYPASS_BRANCH_RULE_PAT }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build binary with cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename and compress binary
        run: |
          mkdir -p bin
          cp target/${{ matrix.target }}/release/${{ inputs.binary_name }} bin/${{ inputs.binary_name }}
          tar -czvf bin/${{ inputs.binary_name }}-${{ matrix.target }}.tar.gz -C bin ${{ inputs.binary_name }}

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.binary_name }}-${{ matrix.target }}
          path: bin/${{ inputs.binary_name }}-${{ matrix.target }}.tar.gz

  github-release:
    name: Create GitHub Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: x71c9/${{ inputs.binary_name }}
          ref: ${{ inputs.version }}
          token: ${{ secrets.BYPASS_BRANCH_RULE_PAT }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          files: bin/**
          token: ${{ github.token }}
          draft: false
          prerelease: false


  update-package-repos:
    name: Update Package Repositories
    needs: github-release
    uses: x71c9/ci-rust/.github/workflows/update-packages.yml@master
    with:
      version: ${{ inputs.version }}
      binary_name: ${{ inputs.binary_name }}
      pkgdesc: ${{ inputs.pkgdesc }}
      aur_depends: ${{ inputs.aur_depends }}
      nur_build_inputs: ${{ inputs.nur_build_inputs }}
      nur_description: ${{ inputs.nur_description }}
      has_shell_completions: ${{ inputs.has_shell_completions }}
      completion_subcommand: ${{ inputs.completion_subcommand }}
    secrets:
      AUR_SECRET_KEY: ${{ secrets.AUR_SECRET_KEY }}
      NUR_PAT: ${{ secrets.NUR_PAT }}
      HOMEBREW_PAT: ${{ secrets.HOMEBREW_PAT }}
