---
name: Release on PR Merge
on:
  workflow_call:
    inputs:
      repo:
        required: true
        type: string
    secrets:
      CI_DISPATCH_TOKEN:
        required: true
permissions:
  contents: write
jobs:
  dispatch:
    name: Dispatch Release
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Build dispatch payload
        run: |
          jq -n \
            --arg repo     "${{ inputs.repo }}" \
            --arg pr_title "${{ github.event.pull_request.title }}" \
            '{
              event_type: "release",
              client_payload: {
                repo:      $repo,
                pr_title:  $pr_title
              }
            }' > payload.json

      - name: Trigger ci-rust release
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ secrets.CI_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            --data @payload.json \
            https://api.github.com/repos/x71c9/ci-rust/dispatches
