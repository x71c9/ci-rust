---
name: Release on PR Merge
on:
  workflow_call:
    inputs:
      crate_name:
        required: true
        type: string
      binary_name:
        required: true
        type: string
      pkgdesc:
        required: true
        type: string
      aur_depends:
        required: false
        type: string
        default: "'glibc'"
      nur_build_inputs:
        required: false
        type: string
        default: ""
      nur_description:
        required: false
        type: string
        default: ""
      has_shell_completions:
        required: false
        type: boolean
        default: false
      completion_subcommand:
        required: false
        type: string
        default: "completion"
      extra_apt_packages:
        required: false
        type: string
        default: ""
      macos_extra_brew:
        required: false
        type: string
        default: ""
      macos_extra_env:
        required: false
        type: string
        default: ""
    secrets:
      BYPASS_BRANCH_RULE_PAT:
        required: true
      CARGO_REGISTRY_TOKEN:
        required: true
      HOMEBREW_PAT:
        required: true
      AUR_SECRET_KEY:
        required: true
      NUR_PAT:
        required: true
permissions:
  contents: write
jobs:
  auto-release:
    name: Auto Release
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    outputs:
      new_version: ${{ steps.release.outputs.new_version }}
      should_release: ${{ steps.release.outputs.should_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BYPASS_BRANCH_RULE_PAT }}

      - name: Install system dependencies
        if: inputs.extra_apt_packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ inputs.extra_apt_packages }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-release
        run: cargo install cargo-release

      - name: Configure Git
        run: |
          git config user.name "x71c9"
          git config user.email "108585118+x71c9@users.noreply.github.com"

      - name: Determine version and release
        id: release
        run: |
          COMMIT_MSG="${{ github.event.pull_request.title }}"
          echo "PR title: $COMMIT_MSG"

          BUMP_TYPE="patch"

          if echo "$COMMIT_MSG" | grep -qE "^(feat|fix|perf|docs|style|refactor|test|chore)!:" || \
             echo "$COMMIT_MSG" | grep -q "BREAKING CHANGE:"; then
            BUMP_TYPE="major"
          elif echo "$COMMIT_MSG" | grep -qE "^feat:"; then
            BUMP_TYPE="minor"
          elif echo "$COMMIT_MSG" | grep -qE "^(fix|perf|security|docs|style|refactor|test|chore):"; then
            BUMP_TYPE="patch"
          else
            echo "Non-conventional commit detected, defaulting to patch"
            BUMP_TYPE="patch"
          fi

          echo "Determined version bump type: $BUMP_TYPE"
          cargo release --execute --no-confirm $BUMP_TYPE

          NEW_VERSION=$(grep '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "new_version=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "should_release=true" >> $GITHUB_OUTPUT
          echo "New version: v$NEW_VERSION"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  trigger-build-and-release:
    name: Trigger Build and Release
    needs: auto-release
    if: needs.auto-release.outputs.should_release == 'true'
    uses: x71c9/ci-rust/.github/workflows/build-release.yml@master
    with:
      version: ${{ needs.auto-release.outputs.new_version }}
      binary_name: ${{ inputs.binary_name }}
      pkgdesc: ${{ inputs.pkgdesc }}
      aur_depends: ${{ inputs.aur_depends }}
      nur_build_inputs: ${{ inputs.nur_build_inputs }}
      nur_description: ${{ inputs.nur_description }}
      has_shell_completions: ${{ inputs.has_shell_completions }}
      completion_subcommand: ${{ inputs.completion_subcommand }}
      macos_extra_brew: ${{ inputs.macos_extra_brew }}
      macos_extra_env: ${{ inputs.macos_extra_env }}
    secrets:
      HOMEBREW_PAT: ${{ secrets.HOMEBREW_PAT }}
      AUR_SECRET_KEY: ${{ secrets.AUR_SECRET_KEY }}
      NUR_PAT: ${{ secrets.NUR_PAT }}
